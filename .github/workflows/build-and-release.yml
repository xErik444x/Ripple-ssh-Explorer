name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d ' \n\r')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Check if tag exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$VERSION does not exist. Will release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            tags: ""
            name: windows-amd64
          - os: windows-latest
            platform: windows/amd64
            tags: "native_webview2loader"
            name: windows-amd64-native-webview2
          - os: ubuntu-24.04  # 22.04 does not ship libwebkitgtk-6.0-dev (required by wails3 CLI at install time)
            platform: linux/amd64
            tags: "webkit2gtk41"
            name: linux-amd64
            server: false
          - os: ubuntu-24.04  # 22.04 does not ship libwebkitgtk-6.0-dev (required by wails3 CLI at install time)
            platform: linux/amd64
            tags: ""
            name: linux-amd64-server
            server: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Must run BEFORE "Install Wails" — `go install` compiles CGo code that
      # links against gtk4 + webkitgtk-6.0 even when you later build with -tags gtk3.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            libwebkitgtk-6.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Fetch WebView2Loader.dll (native_webview2loader build)
        if: runner.os == 'Windows' && matrix.tags == 'native_webview2loader'
        shell: pwsh
        run: |
          # The wails/webview2 Go module uses //go:embed x64/WebView2Loader.dll but
          # the DLL is absent from the module proxy zip — it is a Git LFS blob that
          # proxy.golang.org never fetches. Download it from Microsoft's NuGet package
          # and inject it into the module cache where the embed directive expects it.
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          # Populate the module cache so the directory tree exists
          go mod download github.com/wailsapp/wails/webview2

          $modCache = (go env GOMODCACHE).Trim()
          $dllDir = "$modCache\github.com\wailsapp\wails\webview2@v1.0.24\webviewloader\x64"
          New-Item -ItemType Directory -Force -Path $dllDir | Out-Null
          # Module cache entries are read-only; grant write access for this directory
          icacls $dllDir /grant "Everyone:(OI)(CI)F" /q | Out-Null

          # NuGet packages are zip files — download and extract only the loader DLL
          $pkg = "$env:TEMP\webview2.nupkg"
          Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2" -OutFile $pkg

          $zip   = [System.IO.Compression.ZipFile]::OpenRead($pkg)
          $entry = $zip.Entries | Where-Object { $_.FullName -eq "runtimes/win-x64/native/WebView2Loader.dll" }
          if (-not $entry) { throw "WebView2Loader.dll not found in NuGet package" }
          [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, "$dllDir\WebView2Loader.dll", $true)
          $zip.Dispose()
          Write-Host "Placed WebView2Loader.dll at $dllDir"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TAGS="${{ matrix.tags }}"
          if [ -n "$TAGS" ]; then
            wails3 build -tags "$TAGS"
          else
            wails3 build
          fi

      - name: Build (Linux desktop)
        if: runner.os == 'Linux' && matrix.server == false
        shell: bash
        run: |
          TAGS="${{ matrix.tags }}"
          # Wails prepends "production,gtk3" (comma-separated) to whatever -tags
          # value is passed, so additional tags must also be comma-separated —
          # a space-separated value leaves extra words as bare package paths,
          # causing "malformed import path" errors from go list.
          if [ -n "$TAGS" ]; then
            wails3 build -tags "gtk3,$TAGS"
          else
            wails3 build -tags "gtk3"
          fi

      - name: Build (Linux server)
        if: runner.os == 'Linux' && matrix.server == true
        shell: bash
        run: |
          TAGS="${{ matrix.tags }}"
          if [ -n "$TAGS" ]; then
            wails3 task build:server BUILD_FLAGS="-tags gtk3,$TAGS"
          else
            wails3 task build:server BUILD_FLAGS="-tags gtk3"
          fi

      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p dist
          cp bin/ripple-ssh.exe dist/ripple-ssh-${{ matrix.name }}.exe

      - name: Rename output (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          if [ "${{ matrix.server }}" == "true" ]; then
            cp bin/ripple-ssh-server dist/ripple-ssh-${{ matrix.name }}
          else
            cp bin/ripple-ssh dist/ripple-ssh-${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ripple-ssh-${{ matrix.name }}
          path: dist/*

  release:
    needs: [version-check, build]
    runs-on: ubuntu-latest
    if: needs.version-check.outputs.should_release == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release body
        run: |
          cat > release_notes.md << 'EOF'
          ## Ripple SSH v${{ needs.version-check.outputs.version }}

          ### Available Builds

          | File | Platform | Description |
          |------|----------|-------------|
          | `ripple-ssh-windows-amd64.exe` | Windows | Standard build with embedded WebView2 loader. Recommended for most users. |
          | `ripple-ssh-windows-amd64-native-webview2.exe` | Windows | Build using the **native WebView2 loader** (`-tags native_webview2loader`). Smaller binary size; requires WebView2 Runtime already installed on the system. |
          | `ripple-ssh-linux-amd64` | Linux | Standard desktop build using **WebKitGTK**. Native window with embedded webview. |
          | `ripple-ssh-linux-amd64-server` | Linux | **Server mode** (HTTP server, no GUI). Run with `./ripple-ssh-linux-amd64-server` and open `http://localhost:8080` in your browser. Useful for remote access or headless environments. |

          ---
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          body_path: release_notes.md
          files: artifacts/**/*
